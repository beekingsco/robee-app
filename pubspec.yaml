name: robee_app
description: RoBee Reserve — robotic hive assistant mobile app
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # Camera
  camera: ^0.11.0+2

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3
  web_socket_channel: ^2.4.5

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Utils
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.2
  connectivity_plus: ^6.0.3

  # Stripe (deposit flow)
  flutter_stripe: ^10.1.1

  # Logging
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
